name: 'Lint Chrome Extension'
description: 'Runs ESLint on Chrome extension JavaScript files'
author: 'Your Organization'

inputs:
  extension-dir:
    description: 'Directory containing extension files'
    required: false
    default: 'extension'
  max-warnings:
    description: 'Maximum number of warnings allowed'
    required: false
    default: '0'
  fix:
    description: 'Auto-fix linting issues'
    required: false
    default: 'false'
  config-file:
    description: 'Path to ESLint config file'
    required: false
    default: ''
  ignore-pattern:
    description: 'Patterns to ignore (space-separated)'
    required: false
    default: 'node_modules/** dist/** build/**'

outputs:
  lint-status:
    description: 'Lint status (success/failure)'
    value: ${{ steps.lint.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Check for ESLint config
      id: check-eslint
      env:
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
      run: |
        if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.yml" ] || [ -f "eslint.config.js" ]; then
          echo "config_found=true" >> $GITHUB_OUTPUT
          echo "✅ ESLint config found"
        elif [ -n "$INPUT_CONFIG_FILE" ] && [ -f "$INPUT_CONFIG_FILE" ]; then
          echo "config_found=true" >> $GITHUB_OUTPUT
          echo "✅ Using provided ESLint config: $INPUT_CONFIG_FILE"
        else
          echo "config_found=false" >> $GITHUB_OUTPUT
          echo "⚠️ No ESLint config found - using defaults"
        fi
      shell: bash
    
    - name: Install ESLint (if needed)
      run: |
        if ! npm list eslint --depth=0 >/dev/null 2>&1; then
          echo "Installing ESLint..."
          npm install --no-save eslint
        else
          echo "✅ ESLint already installed"
        fi
      shell: bash
    
    - name: Run ESLint
      id: lint
      env:
        INPUT_MAX_WARNINGS: ${{ inputs.max-warnings }}
        INPUT_FIX: ${{ inputs.fix }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_IGNORE_PATTERN: ${{ inputs.ignore-pattern }}
        INPUT_EXTENSION_DIR: ${{ inputs.extension-dir }}
      run: |
        ESLINT_ARGS=()
        
        # Add max warnings
        ESLINT_ARGS+=("--max-warnings" "$INPUT_MAX_WARNINGS")
        
        # Add fix flag
        [ "$INPUT_FIX" == "true" ] && ESLINT_ARGS+=("--fix")
        
        # Add config file
        [ -n "$INPUT_CONFIG_FILE" ] && ESLINT_ARGS+=("--config" "$INPUT_CONFIG_FILE")
        
        # Add ignore patterns
        read -ra PATTERNS <<< "$INPUT_IGNORE_PATTERN"
        for pattern in "${PATTERNS[@]}"; do
          if [ -n "$pattern" ]; then
            ESLINT_ARGS+=("--ignore-pattern" "$pattern")
          fi
        done
        
        echo "::group::ESLint Check"
        echo "Linting files in $INPUT_EXTENSION_DIR..."
        
        npx eslint "$INPUT_EXTENSION_DIR/**/*.js" \
          --ext .js \
          "${ESLINT_ARGS[@]}" \
          --format stylish
        
        echo "::endgroup::"
        echo "✅ ESLint passed with no errors"
      shell: bash
    
    - name: Commit Auto-fixes
      if: inputs.fix == 'true' && steps.lint.outcome == 'success'
      run: |
        if git diff --quiet; then
          echo "ℹ️ No auto-fixes applied"
        else
          echo "::notice::ESLint auto-fixes were applied to the code"
          echo "⚠️ Remember to commit these changes"
        fi
      shell: bash

branding:
  icon: 'code'
  color: 'yellow'
