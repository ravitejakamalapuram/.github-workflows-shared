name: 'Validate Chrome Extension'
description: 'Validates manifest.json and required extension files'
author: 'Your Organization'

inputs:
  extension-dir:
    description: 'Directory containing extension files'
    required: false
    default: 'extension'
  manifest-version:
    description: 'Expected manifest version (2 or 3)'
    required: false
    default: '3'
  check-icons:
    description: 'Validate that declared icons exist'
    required: false
    default: 'true'
  strict-mode:
    description: 'Enable strict validation (fail on warnings)'
    required: false
    default: 'false'

outputs:
  validation-status:
    description: 'Validation status (success/failure)'
    value: ${{ steps.validate.outcome }}
  manifest-version:
    description: 'Detected manifest version'
    value: ${{ steps.manifest-info.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Check required extension files
      id: validate
      run: |
        set -e
        echo "::group::Validating Extension Structure"
        
        EXT_DIR="${{ inputs.extension-dir }}"
        
        # Check manifest.json exists
        if [ ! -f "$EXT_DIR/manifest.json" ]; then
          echo "::error::Missing manifest.json in $EXT_DIR"
          exit 1
        fi
        echo "✅ manifest.json found"
        
        # Validate JSON structure
        if ! jq empty "$EXT_DIR/manifest.json" > /dev/null 2>&1; then
          echo "::error::manifest.json is not valid JSON"
          exit 1
        fi
        echo "✅ manifest.json is valid JSON"
        
        # Check manifest version
        ACTUAL_VERSION=$(jq -r '.manifest_version' "$EXT_DIR/manifest.json")
        echo "Detected manifest_version: $ACTUAL_VERSION"
        
        if [ "$ACTUAL_VERSION" != "${{ inputs.manifest-version }}" ]; then
          MSG="Expected manifest_version ${{ inputs.manifest-version }}, found $ACTUAL_VERSION"
          if [ "${{ inputs.strict-mode }}" == "true" ]; then
            echo "::error::$MSG"
            exit 1
          else
            echo "::warning::$MSG"
          fi
        fi
        
        # Check for background script (MV2 vs MV3)
        if [ "$ACTUAL_VERSION" == "3" ]; then
          if [ ! -f "$EXT_DIR/background.js" ] && [ ! -f "$EXT_DIR/service-worker.js" ]; then
            echo "::warning::No background.js or service-worker.js found (MV3)"
          else
            echo "✅ Background script found"
          fi
        fi
        
        echo "::endgroup::"
      shell: bash
    
    - name: Extract Manifest Info
      id: manifest-info
      run: |
        EXT_DIR="${{ inputs.extension-dir }}"
        
        VERSION=$(jq -r '.manifest_version' "$EXT_DIR/manifest.json")
        NAME=$(jq -r '.name // "Unknown"' "$EXT_DIR/manifest.json")
        EXT_VERSION=$(jq -r '.version // "Unknown"' "$EXT_DIR/manifest.json")
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "extension_version=$EXT_VERSION" >> $GITHUB_OUTPUT
        
        echo "📦 Extension: $NAME v$EXT_VERSION (Manifest v$VERSION)"
      shell: bash
    
    - name: Validate Icon Files
      if: inputs.check-icons == 'true'
      run: |
        EXT_DIR="${{ inputs.extension-dir }}"
        MANIFEST="$EXT_DIR/manifest.json"
        
        echo "::group::Validating Icon Files"

        MISSING_ICONS=()

        # Extract missing icons
        while read -r line; do
          MISSING_ICONS+=("$line")
        done < <(
          jq -r '
            (
              select(.icons != null and (.icons | type == "object")) | .icons | to_entries[] | "icons.\(.key)|\(.value)"
            ),
            (
              if .manifest_version == 3 then
                select(.action != null and .action.default_icon != null and (.action.default_icon | type == "object")) | .action.default_icon | to_entries[] | "action.default_icon.\(.key)|\(.value)"
              else
                select(.browser_action != null and .browser_action.default_icon != null and (.browser_action.default_icon | type == "object")) | .browser_action.default_icon | to_entries[] | "browser_action.default_icon.\(.key)|\(.value)"
              end
            )
          ' "$MANIFEST" 2>/dev/null | while IFS="|" read -r key val; do
            if [ -n "$val" ] && [ ! -e "$EXT_DIR/$val" ]; then
              echo "$key: $val"
            fi
          done
        )

        if [ ${#MISSING_ICONS[@]} -gt 0 ]; then
          echo "::error::Missing icon files:"
          for icon in "${MISSING_ICONS[@]}"; do
            echo "::error::  - $icon"
          done
          exit 1
        else
          echo "✅ All declared icon files exist"
        fi

        echo "::endgroup::"
      shell: bash
    
    - name: Check JavaScript Syntax
      run: |
        echo "::group::Checking JavaScript Syntax"
        find ${{ inputs.extension-dir }} -name "*.js" | while read f; do
          if ! node -c "$f" 2>/dev/null; then
            echo "::error::Syntax error in $f"
            exit 1
          fi
        done
        echo "✅ All JS files pass syntax check"
        echo "::endgroup::"
      shell: bash
    
    - name: Validate Release Assets and Compliance
      run: |
        python3 ${{ github.action_path }}/../../../scripts/validate-release-assets.py --path . --type chrome-extension --ext-dir "${{ inputs.extension-dir }}"
      shell: bash

branding:
  icon: 'check-circle'
  color: 'green'
