name: 'Run Chrome Extension E2E Tests'
description: 'Runs end-to-end tests using Playwright with extension loaded'
author: 'Your Organization'

inputs:
  test-script:
    description: 'Python test script to run'
    required: false
    default: 'tests/smoke_*.py'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'
  headless:
    description: 'Run tests in headless mode'
    required: false
    default: 'true'
  upload-artifacts-on-failure:
    description: 'Upload screenshots/logs on test failure'
    required: false
    default: 'true'
  artifact-retention-days:
    description: 'Days to retain test artifacts'
    required: false
    default: '7'

outputs:
  test-status:
    description: 'E2E test status (success/failure)'
    value: ${{ steps.test.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Install Playwright
      run: |
        echo "::group::Installing Playwright"
        pip install playwright websockets
        python -m playwright install chromium
        echo "::endgroup::"
        echo "✅ Playwright installed with Chromium"
      shell: bash
    
    - name: Run E2E Tests
      id: test
      run: |
        echo "::group::Running E2E Tests"
        
        export HEADLESS="${{ inputs.headless }}"
        
        # Run test script(s)
        if [[ "${{ inputs.test-script }}" == *"*"* ]]; then
          # Wildcard pattern - run all matching files
          for test_file in ${{ inputs.test-script }}; do
            if [ -f "$test_file" ]; then
              echo "Running: $test_file"
              python3 "$test_file"
            fi
          done
        else
          # Single file
          if [ -f "${{ inputs.test-script }}" ]; then
            python3 ${{ inputs.test-script }}
          else
            echo "::warning::Test script not found: ${{ inputs.test-script }}"
            exit 0
          fi
        fi
        
        echo "::endgroup::"
        echo "✅ All E2E tests passed"
      shell: bash
    
    - name: Upload Test Failure Artifacts
      if: failure() && inputs.upload-artifacts-on-failure == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-failures-${{ github.run_number }}
        path: |
          test-results/
          screenshots/
          /tmp/*.png
          *.log
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: ignore
    
    - name: Generate Test Summary
      if: always()
      run: |
        echo "## 🎭 E2E Test Results" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.test.outcome }}" == "success" ]; then
          echo "✅ All E2E tests passed" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.test.outcome }}" == "skipped" ]; then
          echo "⏭️ E2E tests skipped" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Some E2E tests failed" >> $GITHUB_STEP_SUMMARY
          echo "📸 Test artifacts have been uploaded" >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash

branding:
  icon: 'eye'
  color: 'purple'
