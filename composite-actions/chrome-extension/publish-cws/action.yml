name: 'Publish to Chrome Web Store'
description: 'Publishes Chrome extension to Chrome Web Store'
author: 'Your Organization'

inputs:
  extension-id:
    description: 'Chrome Web Store extension ID'
    required: false
  client-id:
    description: 'Chrome Web Store API client ID'
    required: false
  client-secret:
    description: 'Chrome Web Store API client secret'
    required: false
  refresh-token:
    description: 'Chrome Web Store API refresh token'
    required: false
  zip-path:
    description: 'Path to the extension ZIP file'
    required: true
  publish-target:
    description: 'Publish target (default, trustedTesters)'
    required: false
    default: 'default'
  auto-publish:
    description: 'Auto-publish after upload'
    required: false
    default: 'true'

outputs:
  publish-status:
    description: 'Publish status (success/failure)'
    value: ${{ steps.publish.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Validate Inputs
      env:
        ZIP_PATH: ${{ inputs.zip-path }}
      run: |
        if [ ! -f "$ZIP_PATH" ]; then
          echo "::error::ZIP file not found: $ZIP_PATH"
          exit 1
        fi
        
        echo "✅ ZIP file validated: $ZIP_PATH"
      shell: bash
    
    - name: Publish to Chrome Web Store
      id: publish
      if: inputs.extension-id != '' && inputs.client-id != '' && inputs.client-secret != '' && inputs.refresh-token != ''
      uses: mnao305/chrome-extension-upload@v5.0.0
      with:
        extension-id: ${{ inputs.extension-id }}
        client-id: ${{ inputs.client-id }}
        client-secret: ${{ inputs.client-secret }}
        refresh-token: ${{ inputs.refresh-token }}
        file-path: ${{ inputs.zip-path }}
        publish: ${{ inputs.auto-publish }}
        publish-target: ${{ inputs.publish-target }}
    
    - name: Publish Summary
      if: always()
      env:
        EXTENSION_ID: ${{ inputs.extension-id }}
        PUBLISH_TARGET: ${{ inputs.publish-target }}
        AUTO_PUBLISH: ${{ inputs.auto-publish }}
      run: |
        echo "## 🚀 Chrome Web Store Publish" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.publish.outcome }}" == "success" ]; then
          echo "✅ Successfully published to Chrome Web Store" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ steps.publish.outcome }}" == "skipped" ]; then
          echo "⚠️ Skipped publishing to Chrome Web Store - credentials not supplied" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Publish to Chrome Web Store failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Extension ID**: \`$EXTENSION_ID\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Publish Target**: $PUBLISH_TARGET" >> $GITHUB_STEP_SUMMARY
        echo "- **Auto-Publish**: $AUTO_PUBLISH" >> $GITHUB_STEP_SUMMARY
        
        if [ "$AUTO_PUBLISH" == "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Extension will be available in the Chrome Web Store shortly" >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📝 Extension uploaded as draft - manual publish required" >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash

branding:
  icon: 'upload-cloud'
  color: 'blue'
