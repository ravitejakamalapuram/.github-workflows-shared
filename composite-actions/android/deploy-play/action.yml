name: 'Deploy to Google Play Store'
description: 'Uploads AAB to Google Play Store using service account'
author: 'Your Organization'

inputs:
  service-account-json:
    description: 'Google Play service account JSON (plain text or base64)'
    required: true
  package-name:
    description: 'Android package name (e.g., com.example.app)'
    required: true
  aab-path:
    description: 'Path to the AAB file to upload'
    required: true
  track:
    description: 'Release track (internal, alpha, beta, production)'
    required: false
    default: 'alpha'
  release-status:
    description: 'Release status (completed, draft, halted, inProgress)'
    required: false
    default: 'completed'
  user-fraction:
    description: 'Rollout percentage (0.0 to 1.0, only for production)'
    required: false
    default: '1.0'
  whats-new-dir:
    description: 'Directory containing release notes (optional)'
    required: false
    default: ''

outputs:
  upload-status:
    description: 'Upload status (success/failure)'
    value: ${{ steps.upload.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Validate Inputs
      env:
        AAB_PATH: ${{ inputs.aab-path }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        TRACK: ${{ inputs.track }}
        USER_FRACTION: ${{ inputs.user-fraction }}
      run: |
        if [ ! -f "$AAB_PATH" ]; then
          echo "❌ AAB file not found: $AAB_PATH"
          exit 1
        fi

        echo "✅ AAB file found: $AAB_PATH"
        echo "📦 Package: $PACKAGE_NAME"
        echo "🎯 Track: $TRACK"
        echo "📊 User Fraction: $USER_FRACTION"
      shell: bash
    
    - name: Upload to Google Play
      id: upload
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ inputs.service-account-json }}
        packageName: ${{ inputs.package-name }}
        releaseFiles: ${{ inputs.aab-path }}
        track: ${{ inputs.track }}
        status: ${{ inputs.release-status }}
        userFraction: ${{ inputs.release-status == 'inProgress' && inputs.user-fraction || '' }}
        whatsNewDirectory: ${{ inputs.whats-new-dir }}
        changesNotSentForReview: true
    
    - name: Upload Summary
      if: always()
      env:
        UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        TRACK: ${{ inputs.track }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        RELEASE_STATUS: ${{ inputs.release-status }}
        USER_FRACTION: ${{ inputs.user-fraction }}
      run: |
        echo "## 🚀 Google Play Deployment" >> $GITHUB_STEP_SUMMARY

        if [ "$UPLOAD_OUTCOME" == "success" ]; then
          echo "✅ Successfully uploaded to **$TRACK** track" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Upload to Google Play failed" >> $GITHUB_STEP_SUMMARY
        fi

        echo "- **Package**: \`$PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Track**: $TRACK" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: $RELEASE_STATUS" >> $GITHUB_STEP_SUMMARY
        if [ "$TRACK" == "production" ]; then
          ROLLOUT=$(echo "$USER_FRACTION * 100" | bc)
          echo "- **Rollout**: ${ROLLOUT}%" >> $GITHUB_STEP_SUMMARY
        fi
      shell: bash

branding:
  icon: 'upload-cloud'
  color: 'green'
