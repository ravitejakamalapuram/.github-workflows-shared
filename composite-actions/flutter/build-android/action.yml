name: 'Build Flutter Android App'
description: 'Builds Flutter Android app (APK or AAB)'
author: 'Your Organization'

inputs:
  build-type:
    description: 'Build type: apk or appbundle'
    required: false
    default: 'appbundle'
  flavor:
    description: 'Build flavor (if using flavors)'
    required: false
    default: ''
  build-mode:
    description: 'Build mode: debug, profile, or release'
    required: false
    default: 'release'
  split-per-abi:
    description: 'Build separate APKs per ABI (only for APK builds)'
    required: false
    default: 'false'
  obfuscate:
    description: 'Enable code obfuscation'
    required: false
    default: 'true'
  split-debug-info:
    description: 'Directory for debug info (enables obfuscation)'
    required: false
    default: 'build/app/outputs/symbols'
  extra-args:
    description: 'Additional flutter build arguments'
    required: false
    default: ''
  keystore-base64:
    description: 'Base64 encoded keystore file (for signing)'
    required: false
    default: ''
  keystore-password:
    description: 'Keystore password'
    required: false
    default: ''
  key-alias:
    description: 'Key alias'
    required: false
    default: ''
  key-password:
    description: 'Key password'
    required: false
    default: ''

outputs:
  artifact-path:
    description: 'Path to the generated artifact'
    value: ${{ steps.build.outputs.artifact_path }}
  build-status:
    description: 'Build status (success/failure)'
    value: ${{ steps.build.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Setup Signing
      if: inputs.keystore-base64 != ''
      env:
        KEYSTORE_BASE64: ${{ inputs.keystore-base64 }}
        KEYSTORE_PASSWORD: ${{ inputs.keystore-password }}
        KEY_PASSWORD: ${{ inputs.key-password }}
        KEY_ALIAS: ${{ inputs.key-alias }}
      run: |
        echo "::group::Setup Android Signing"

        # Decode and save keystore
        echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

        # Create key.properties file
        cat > android/key.properties << EOF
        storePassword=$KEYSTORE_PASSWORD
        keyPassword=$KEY_PASSWORD
        keyAlias=$KEY_ALIAS
        storeFile=upload-keystore.jks
        EOF

        echo "✅ Signing configuration created"
        echo "::endgroup::"
      shell: bash

    - name: Build Flutter Android
      id: build
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        BUILD_MODE: ${{ inputs.build-mode }}
        FLAVOR: ${{ inputs.flavor }}
        SPLIT_PER_ABI: ${{ inputs.split-per-abi }}
        OBFUSCATE: ${{ inputs.obfuscate }}
        SPLIT_DEBUG_INFO: ${{ inputs.split-debug-info }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -e

        BUILD_CMD="flutter build $BUILD_TYPE"
        
        # Add build mode
        if [ "$BUILD_MODE" != "release" ]; then
          BUILD_CMD="$BUILD_CMD --$BUILD_MODE"
        fi
        
        # Add flavor if specified
        [ -n "$FLAVOR" ] && BUILD_CMD="$BUILD_CMD --flavor $FLAVOR"
        
        # Add split-per-abi for APK builds
        if [ "$BUILD_TYPE" == "apk" ] && [ "$SPLIT_PER_ABI" == "true" ]; then
          BUILD_CMD="$BUILD_CMD --split-per-abi"
        fi
        
        # Add obfuscation settings
        if [ "$OBFUSCATE" == "true" ]; then
          mkdir -p "$SPLIT_DEBUG_INFO"
          BUILD_CMD="$BUILD_CMD --obfuscate --split-debug-info=$SPLIT_DEBUG_INFO"
        fi
        
        # Add extra args
        [ -n "$EXTRA_ARGS" ] && BUILD_CMD="$BUILD_CMD $EXTRA_ARGS"
        
        echo "::group::Building Flutter Android ($BUILD_TYPE)"
        echo "Command: $BUILD_CMD"
        $BUILD_CMD
        echo "::endgroup::"
        
        # Find the generated artifact
        if [ "$BUILD_TYPE" == "appbundle" ]; then
          ARTIFACT=$(find build/app/outputs/bundle -name "*.aab" | head -1)
        else
          ARTIFACT=$(find build/app/outputs/apk -name "*.apk" | head -1)
        fi
        
        if [ -n "$ARTIFACT" ]; then
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          ARTIFACT_SIZE=$(du -h "$ARTIFACT" | cut -f1)
          echo "✅ Build successful: $ARTIFACT ($ARTIFACT_SIZE)"
          
          echo "## 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: $BUILD_MODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**: \`$ARTIFACT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $ARTIFACT_SIZE" >> $GITHUB_STEP_SUMMARY
          if [ "$OBFUSCATE" == "true" ]; then
            echo "- **Obfuscated**: Yes" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "❌ Artifact not found after build"
          exit 1
        fi
      shell: bash

branding:
  icon: 'smartphone'
  color: 'orange'
