name: 'Flutter Test'
description: 'Runs Flutter tests with coverage reporting'
author: 'Your Organization'

inputs:
  coverage:
    description: 'Enable code coverage'
    required: false
    default: 'true'
  upload-coverage:
    description: 'Upload coverage to Codecov'
    required: false
    default: 'false'
  coverage-threshold:
    description: 'Minimum coverage percentage required (0-100)'
    required: false
    default: '0'
  test-path:
    description: 'Specific test file or directory to run'
    required: false
    default: ''
  exclude-tags:
    description: 'Tags to exclude from tests (e.g., golden,integration)'
    required: false
    default: ''
  extra-args:
    description: 'Additional flutter test arguments'
    required: false
    default: ''

outputs:
  test-status:
    description: 'Test execution status (success/failure)'
    value: ${{ steps.test.outcome }}
  coverage-percentage:
    description: 'Code coverage percentage'
    value: ${{ steps.coverage-report.outputs.coverage }}

runs:
  using: 'composite'
  steps:
    - name: Run Flutter Tests
      id: test
      env:
        COVERAGE: ${{ inputs.coverage }}
        TEST_PATH: ${{ inputs.test-path }}
        EXCLUDE_TAGS: ${{ inputs.exclude-tags }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        TEST_ARGS=""
        [ "$COVERAGE" == "true" ] && TEST_ARGS="$TEST_ARGS --coverage"
        [ -n "$TEST_PATH" ] && TEST_ARGS="$TEST_ARGS $TEST_PATH"
        [ -n "$EXCLUDE_TAGS" ] && TEST_ARGS="$TEST_ARGS --exclude-tags=$EXCLUDE_TAGS"

        echo "::group::Flutter Test"
        flutter test $TEST_ARGS $EXTRA_ARGS
        echo "::endgroup::"

        echo "✅ All tests passed"
      shell: bash
    
    - name: Generate Coverage Report
      id: coverage-report
      if: inputs.coverage == 'true'
      env:
        COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
      run: |
        if [ -f "coverage/lcov.info" ]; then
          echo "::group::Coverage Summary"
          
          # Calculate coverage percentage (requires lcov tool)
          if command -v lcov &> /dev/null; then
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines......: \K[0-9.]+')
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "📊 Code Coverage: $COVERAGE%"
          else
            echo "⚠️ lcov not installed, skipping coverage percentage calculation"
            echo "coverage=unknown" >> $GITHUB_OUTPUT
          fi
          
          echo "::endgroup::"
          
          # Check coverage threshold
          if [ -n "$COVERAGE" ] && [ "$COVERAGE_THRESHOLD" != "0" ]; then
            if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "::error::❌ Coverage $COVERAGE% is below threshold $COVERAGE_THRESHOLD%"
              exit 1
            else
              echo "✅ Coverage $COVERAGE% meets threshold $COVERAGE_THRESHOLD%"
            fi
          fi
        else
          echo "⚠️ No coverage file found"
          echo "coverage=0" >> $GITHUB_OUTPUT
        fi
      shell: bash
    
    - name: Upload Coverage to Codecov
      if: inputs.upload-coverage == 'true' && inputs.coverage == 'true'
      uses: codecov/codecov-action@v4
      with:
        files: coverage/lcov.info
        flags: flutter
        fail_ci_if_error: false
    
    - name: Generate Test Summary
      if: always()
      env:
        COVERAGE: ${{ inputs.coverage }}
      run: |
        echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.test.outcome }}" == "success" ]; then
          echo "✅ All tests passed successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "$COVERAGE" == "true" ] && [ -f "coverage/lcov.info" ]; then
          COVERAGE_OUT="${{ steps.coverage-report.outputs.coverage }}"
          if [ "$COVERAGE_OUT" != "unknown" ] && [ "$COVERAGE_OUT" != "0" ]; then
            echo "📊 **Code Coverage**: $COVERAGE_OUT%" >> $GITHUB_STEP_SUMMARY
          fi
        fi
      shell: bash

branding:
  icon: 'check-square'
  color: 'green'
