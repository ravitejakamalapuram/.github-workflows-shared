name: 'Generate Changelog'
description: 'Generates changelog from git commit history'
author: 'Your Organization'

inputs:
  output-file:
    description: 'Output file for changelog'
    required: false
    default: 'CHANGELOG.md'
  commit-range:
    description: 'Git commit range (e.g., v1.0.0..HEAD or auto for automatic detection)'
    required: false
    default: 'auto'
  format:
    description: 'Output format (markdown or text)'
    required: false
    default: 'markdown'
  group-by:
    description: 'Group commits by type (conventional-commits or none)'
    required: false
    default: 'conventional-commits'
  include-authors:
    description: 'Include commit authors'
    required: false
    default: 'true'

outputs:
  changelog-content:
    description: 'Generated changelog content'
    value: ${{ steps.generate.outputs.content }}
  changes-file:
    description: 'Path to the generated changelog file'
    value: ${{ inputs.output-file }}

runs:
  using: 'composite'
  steps:
    - name: Determine Commit Range
      id: range
      env:
        COMMIT_RANGE: ${{ inputs.commit-range }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
      run: |
        if [ "$COMMIT_RANGE" == "auto" ]; then
          # Auto-detect range
          PREV_SHA="$EVENT_BEFORE"
          CURR_SHA="$EVENT_AFTER"
          
          if [ "$PREV_SHA" == "0000000000000000000000000000000000000000" ] || [ -z "$PREV_SHA" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$LAST_TAG" ]; then
              RANGE="$LAST_TAG..HEAD"
            else
              RANGE="HEAD~10..HEAD"
            fi
          else
            RANGE="$PREV_SHA..$CURR_SHA"
          fi
        else
          RANGE="$COMMIT_RANGE"
        fi
        
        echo "range=$RANGE" >> $GITHUB_OUTPUT
        echo "📊 Using commit range: $RANGE"
      shell: bash
    
    - name: Generate Changelog
      id: generate
      env:
        INCLUDE_AUTHORS: ${{ inputs.include-authors }}
        GROUP_BY: ${{ inputs.group-by }}
      run: |
        RANGE="${{ steps.range.outputs.range }}"
        
        echo "::group::Generating Changelog"
        
        # ⚡ Bolt Optimization: Fetch commits once instead of 4 times for conventional-commits grouping
        git log --oneline --pretty=format:"- %s (%h)${{ env.INCLUDE_AUTHORS == 'true' && ' by %an' || '' }}" $RANGE > all_commits.txt || true

        if [ "$GROUP_BY" == "conventional-commits" ]; then
          # Group by conventional commit types
          {
            echo "## 🚀 Features"
            if [ -s all_commits.txt ]; then grep "^- feat" all_commits.txt || echo "  _No new features_"; else echo "  _No new features_"; fi
            echo ""
            echo "## 🐛 Bug Fixes"
            if [ -s all_commits.txt ]; then grep "^- fix" all_commits.txt || echo "  _No bug fixes_"; else echo "  _No bug fixes_"; fi
            echo ""
            echo "## 📝 Documentation"
            if [ -s all_commits.txt ]; then grep "^- docs" all_commits.txt || echo "  _No documentation changes_"; else echo "  _No documentation changes_"; fi
            echo ""
            echo "## 🔧 Other Changes"
            if [ -s all_commits.txt ]; then grep -v "^- feat\|^- fix\|^- docs" all_commits.txt || echo "  _No other changes_"; else echo "  _No other changes_"; fi
          } > temp_changelog.md
        else
          # Simple list
          cat all_commits.txt > temp_changelog.md
        fi
        rm -f all_commits.txt
        
        CONTENT=$(cat temp_changelog.md)
        
        if [ -z "$CONTENT" ]; then
          CONTENT="- Routine maintenance and updates"
          echo "$CONTENT" > temp_changelog.md
        fi
        
        echo "::endgroup::"
        echo "✅ Changelog generated"
        
        # Save for output (escape for multiline)
        {
          echo 'content<<EOF'
          cat temp_changelog.md
          echo EOF
        } >> $GITHUB_OUTPUT
      shell: bash
    
    - name: Update Changelog File
      env:
        OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        DATE=$(date +"%Y-%m-%d")
        
        # Create or update main changelog
        if [ ! -f "$OUTPUT_FILE" ]; then
          echo "# Changelog" > "$OUTPUT_FILE"
          echo "" >> "$OUTPUT_FILE"
        fi
        
        # Prepend new changes
        {
          echo "## [$DATE]"
          echo ""
          cat temp_changelog.md
          echo ""
          tail -n +2 "$OUTPUT_FILE" || true
        } > temp_full_changelog.md
        
        echo "# Changelog" > "$OUTPUT_FILE"
        echo "" >> "$OUTPUT_FILE"
        cat temp_full_changelog.md >> "$OUTPUT_FILE"
        
        rm -f temp_changelog.md temp_full_changelog.md
        
        echo "✅ Changelog file updated: $OUTPUT_FILE"
      shell: bash

branding:
  icon: 'file-text'
  color: 'blue'
