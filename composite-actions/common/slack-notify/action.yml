name: 'Slack Notification'
description: 'Sends a standardized, premium Slack notification for CI/CD status'
author: 'Your Organization'

inputs:
  slack-webhook-url:
    description: 'Slack webhook URL'
    required: true
  status:
    description: 'Job status (success, failure, cancelled)'
    required: true
  app-name:
    description: 'Name of the application'
    required: false
    default: 'App'
  version:
    description: 'Application version'
    required: false
    default: ''
  build-number:
    description: 'Build number'
    required: false
    default: ''
  track:
    description: 'Deployment track (e.g., Alpha, Beta, Production)'
    required: false
    default: ''
  size-mb:
    description: 'Build size in MB'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Post Slack Notification via cURL
      run: |
        STATUS="${{ inputs.status }}"
        APP_NAME="${{ inputs.app-name }}"
        VERSION="${{ inputs.version }}"
        BUILD_NUMBER="${{ inputs.build-number }}"
        TRACK="${{ inputs.track }}"
        SIZE_MB="${{ inputs.size-mb }}"
        SLACK_WEBHOOK_URL="${{ inputs.slack-webhook-url }}"

        # Determine color, icon and header text
        if [ "$STATUS" == "success" ]; then
          COLOR="#2eb886" # Green
          STATUS_TEXT="✅ *Deployment Success for $APP_NAME*"
        elif [ "$STATUS" == "failure" ]; then
          COLOR="#a30200" # Red
          STATUS_TEXT="❌ *Deployment Failed for $APP_NAME*"
        else
          COLOR="#e8a723" # Amber
          STATUS_TEXT="⚠️ *Deployment Warning/Cancelled for $APP_NAME*"
        fi

        # ⚡ Bolt Optimization: Batch jq queries to construct payload in one pass
        # Construct overall attachment payload
        PAYLOAD=$(jq -n \
          --arg text "$STATUS_TEXT" \
          --arg color "$COLOR" \
          --arg version "$VERSION" \
          --arg build_number "$BUILD_NUMBER" \
          --arg track "$TRACK" \
          --arg size_mb "$SIZE_MB" \
          '{
            text: $text,
            attachments: [
              {
                color: $color,
                fields: (
                  []
                  + (if $version != "" then [{"title": "Version", "value": $version, "short": true}] else [] end)
                  + (if $build_number != "" then [{"title": "Build Number", "value": $build_number, "short": true}] else [] end)
                  + (if $track != "" then [{"title": "Track", "value": $track, "short": true}] else [] end)
                  + (if $size_mb != "" then [{"title": "App Size", "value": ($size_mb + " MB"), "short": true}] else [] end)
                )
              }
            ]
          }')

        echo "🚀 Sending Slack Webhook payload (bypassing SSL verification if needed)..."
        # Using curl with -k/--insecure to support self-hosted runners with broken CA certificates
        RESPONSE=$(curl -k -s -w "\n%{http_code}" -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL")
        
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | sed '$d')

        if [ "$HTTP_CODE" -ne 200 ]; then
          echo "❌ Slack Webhook POST failed with status $HTTP_CODE"
          echo "Response: $BODY"
          exit 1
        fi
        
        echo "✅ Slack notification sent successfully!"
      shell: bash

branding:
  icon: 'message-circle'
  color: 'blue'
