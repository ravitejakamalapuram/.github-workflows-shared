# Example Chrome Extension CI/CD Workflow
# This example shows how to use centralized actions for a Chrome Extension project

name: Chrome Extension CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent builds
concurrency:
  group: extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI: Continuous Integration
  ci:
    name: Validate & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Validate Extension
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/validate@v1
        with:
          extension-dir: 'extension'
          manifest-version: '3'
          strict-mode: 'false'
      
      - name: Lint Code
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/lint@v1
        with:
          max-warnings: 0
          auto-fix: 'false'
      
      - name: Run Unit Tests
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/test-unit@v1
        with:
          coverage: 'false'
          test-script: 'test'
  
  # E2E Tests (only on push, not PR)
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run E2E Tests
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/test-e2e@v1
        with:
          extension-dir: 'extension'
          test-pattern: 'tests/smoke_*.py'
          python-version: '3.11'
          headless: 'true'
          upload-artifacts-on-failure: 'true'
  
  # CD: Continuous Delivery (only on main branch)
  cd:
    name: Package & Release
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Generate Changelog
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/common/changelog@v1
        with:
          output-file: 'CHANGELOG.md'
          format: 'markdown'
      
      - name: Bump Version
        id: version
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/common/version-bump@v1
        with:
          bump-type: 'auto'
          tag-prefix: 'v'
          push-tag: 'true'
      
      - name: Update manifest.json Version
        run: |
          VERSION="${{ steps.version.outputs.new-version }}"
          jq --arg version "$VERSION" '.version = $version' extension/manifest.json > temp.json
          mv temp.json extension/manifest.json
      
      - name: Package Extension
        id: package
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/package@v1
        with:
          extension-dir: 'extension'
          output-name: 'extension'
          exclude-source-maps: 'true'
      
      - name: Create GitHub Release
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/common/create-release@v1
        with:
          tag-name: ${{ steps.version.outputs.new-tag }}
          release-name: 'Release ${{ steps.version.outputs.new-tag }}'
          body-file: 'CHANGELOG.md'
          files: ${{ steps.package.outputs.package-path }}
      
      - name: Publish to Chrome Web Store
        uses: YOUR_ORG/.github-workflows-shared/composite-actions/chrome-extension/publish-cws@v1
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          zip-path: ${{ steps.package.outputs.package-path }}
          publish-target: 'default'
          auto-publish: 'true'
