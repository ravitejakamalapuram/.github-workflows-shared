name: Reusable Cloudflare Pages Deploy

on:
  workflow_call:
    inputs:
      project-name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      directory:
        description: 'Directory to deploy'
        required: false
        type: string
        default: '.'
      production-branch:
        description: 'Production branch name'
        required: false
        type: string
        default: 'main'
      runner-type:
        description: 'Runner type to use'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      cloudflare-api-token:
        description: 'Cloudflare API Token'
        required: true
      cloudflare-account-id:
        description: 'Cloudflare Account ID'
        required: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ${{ inputs.runner-type }}
    timeout-minutes: 10
    
    permissions:
      contents: read
      deployments: write
    
    steps:
